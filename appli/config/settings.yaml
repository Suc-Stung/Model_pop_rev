# Fichier de configuration du projet
# Projet : Dynamic Population Mapping Model
# Auteur : LEDERMANN Quentin
# Date : June 2025

# === Paramètres généraux ===
departement: "67"  # Code du département
maillage: 200      # Taille de la grille en mètres

# === Chemins de données (modele) ===
chemins_modele:
  donnees_brutes:
    sirene: "modele/data/raw/sirene.parquet"
    recens: "modele/data/raw/recens.parquet"
    osm:
      amenity: "modele/data/raw/amenity.parquet"
      shop: "modele/data/raw/shop.parquet"
      office: "modele/data/raw/office.parquet"
      leisure: "modele/data/raw/leisure.parquet"
  donnees_traitees:
    batiment: "modele/data/processed/BATIMENT.parquet"
    bpe: "modele/data/processed/bpe.parquet"
    secteurs: "modele/data/processed/secteurs.parquet"
    surf_batie_200m: "modele/data/processed/surf_bati_200m.csv"
  cibles:
    pop_jour: "modele/data/target/all_villes_pop_jour_secteurs.geojson"
    pop_nuit: "modele/data/target/all_villes_pop_nuit_secteurs.geojson"
  grille:
    mobiliscope_200m: "modele/output/grid/grid_mobiliscope_200m.parquet"
  fusion_modele: "modele/output/fusion/features_modele.csv"

# === Chemins d'entrée (appli) ===
chemins_appli:
  donnees:
    sirene: "appli/data/sirene/sirene.geojson"
    recens: "appli/data/recens"
    osm: "appli/data/osm"
    topo: "appli/data/topo/BATIMENT.shp"
    bpe: "appli/data/bpe"
  catalogue_poi: "appli/utils/score_POI.csv"
  grille: "appli/output/grid"
  grille_fichier: "appli/output/grid/grid_{departement}_{maillage}m.geojson"
  features: "appli/output/features"
  feature_fichier: "appli/output/features/{nom}_{maillage}m.csv"
  fusion: "appli/output/fusion"
  fusion_fichier: "appli/output/fusion/features_fusionnees_{maillage}m.csv"
  resultats: "appli/output/results"
  prediction_fichier: "appli/output/results/predictions_{departement}.gpkg"

